<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Şampiyon Yazım</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #F2F2F7; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }

    .screen {
      min-height: 100vh;
      background: #F2F2F7;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ───── Home ───── */
    .home-screen { justify-content: space-between; padding: 64px 28px 52px; }

    .home-logo-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .home-logo {
      width: 120px; height: 120px;
      background: linear-gradient(145deg, #1C3A5E, #2a5280);
      border-radius: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
      box-shadow: 0 10px 40px rgba(28,58,94,0.30);
    }
    .home-title {
      font-size: 28px; font-weight: 800;
      color: #006039; letter-spacing: -0.5px; text-align: center;
    }
    .home-sub {
      font-size: 15px; color: #8E8E93;
      text-align: center; max-width: 240px; line-height: 1.5;
    }

    .home-btns { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .menu-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 20px;
      border: none; border-radius: 16px; cursor: pointer;
      width: 100%; color: white;
      font-size: 17px; font-weight: 600; font-family: inherit;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-btn:active:not(:disabled) { transform: scale(0.97); opacity: 0.88; }
    .menu-btn:disabled { opacity: 0.45; cursor: default; }
    .menu-btn-icon { font-size: 20px; width: 28px; text-align: center; }
    .menu-btn-label { flex: 1; text-align: left; }
    .menu-btn-badge { font-size: 13px; opacity: 0.85; font-weight: 500; }
    .menu-btn-arr { opacity: 0.65; font-size: 15px; margin-left: 2px; }

    .help-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; background: rgba(28,58,94,0.1); color: #1C3A5E;
      font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin: 6px auto 0;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .help-btn:active { opacity: 0.65; }

    /* ───── Game ───── */
    .game-screen { justify-content: flex-start; padding: 0; overflow: hidden; }

    .game-header {
      width: 100%; display: flex; align-items: center;
      padding: 20px 20px 0; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: rgba(28,58,94,0.1); color: #1C3A5E;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { opacity: 0.65; }

    .score-chips { display: flex; gap: 7px; }
    .chip {
      padding: 4px 10px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
    }
    .chip-ok { background: rgba(52,199,89,0.15); color: #34C759; }
    .chip-no {
      background: rgba(255,59,48,0.15); color: #FF3B30;
      border: none; font-family: inherit; cursor: pointer;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
    }
    .chip-no:active { opacity: 0.65; }

    /* ───── Wrong Panel ───── */
    .wrong-panel-sheet {
      width: 100%; max-width: 480px;
      margin: 0 auto; background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 44px;
      max-height: 75vh; display: flex; flex-direction: column;
      animation: slideUp .28s cubic-bezier(0.34,1.56,0.64,1);
    }
    .wrong-panel-header {
      display: flex; align-items: center;
      margin-bottom: 16px; gap: 8px;
    }
    .wrong-panel-title { font-size: 17px; font-weight: 700; color: #1C1C1E; flex: 1; }
    .wrong-panel-badge {
      font-size: 13px; font-weight: 600; color: #FF3B30;
      background: rgba(255,59,48,0.12); padding: 3px 10px; border-radius: 20px;
    }
    .wrong-panel-close {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: rgba(28,58,94,0.08); color: #1C3A5E;
      font-size: 15px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .wrong-panel-close:active { opacity: 0.65; }
    .wrong-panel-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .wrong-panel-item { background: #F9F9F9; border-radius: 12px; padding: 14px 16px; }
    .wrong-panel-incorrect { font-size: 14px; color: #FF3B30; text-decoration: line-through; margin-bottom: 5px; font-weight: 600; }
    .wrong-panel-correct { font-size: 16px; color: #1C7A3B; font-weight: 700; }

    /* Card area */
    .cards-area {
      flex: 1; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 24px 16px;
    }

    .card-stack-wrap {
      position: relative;
      width: 100%; max-width: 360px;
    }

    .ghost-card {
      position: absolute; top: 0; left: 50%;
      width: 100%; height: 220px;
      background: white; border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .ghost-2 { transform: translateX(-50%) scale(0.96) translateY(8px); z-index: 1; }
    .ghost-3 { transform: translateX(-50%) scale(0.92) translateY(16px); z-index: 0; opacity: 0.6; }

    .card-slot { position: relative; height: 220px; z-index: 2; }

    .card {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: white; border-radius: 20px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.10);
      display: flex; align-items: center; justify-content: center;
      padding: 28px;
      cursor: grab;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
      overflow: hidden;
    }
    .card:active { cursor: grabbing; }

    .card-text {
      font-size: 22px; font-weight: 700;
      color: #1C1C1E; text-align: center;
      line-height: 1.45; position: relative; z-index: 1;
    }

    .card-overlay {
      position: absolute; inset: 0; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .overlay-stamp {
      font-size: 26px; font-weight: 900;
      letter-spacing: 2px; color: white;
      border: 3px solid rgba(255,255,255,0.9);
      padding: 7px 18px; border-radius: 8px;
    }
    .stamp-right { transform: rotate(-15deg); }
    .stamp-left  { transform: rotate(15deg); }

    /* Swipe hints */
    .swipe-hints {
      width: 100%; max-width: 360px;
      display: flex; justify-content: space-between;
      padding: 0 6px; margin-top: 18px;
    }
    .hint {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600;
    }
    .hint-arrow { font-size: 18px; }

    /* ───── Result Modal ───── */
    .overlay-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end;
      z-index: 200;
      animation: fadeIn .18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-sheet {
      width: 100%; max-width: 480px;
      margin: 0 auto;
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 44px;
      animation: slideUp .28s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .result-pill {
      width: 36px; height: 4px;
      background: #E5E5EA; border-radius: 2px;
      margin: 0 auto 22px;
    }

    .result-row-header {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 20px;
    }
    .result-icon-circle {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,59,48,0.12);
      font-size: 16px; font-weight: 800; color: #FF3B30;
      flex-shrink: 0;
    }
    .result-header-text {
      font-size: 17px; font-weight: 700; color: #FF3B30;
    }

    .result-answer-row {
      display: flex; align-items: center; gap: 12px;
      border-radius: 14px; padding: 14px 16px;
      margin-bottom: 10px;
    }
    .result-answer-icon {
      font-size: 17px; font-weight: 800; flex-shrink: 0; width: 20px; text-align: center;
    }
    .result-answer-text {
      font-size: 16px; font-weight: 600; line-height: 1.4;
    }
    .row-wrong  { background: rgba(255,59,48,0.08); }
    .row-wrong  .result-answer-icon { color: #FF3B30; }
    .row-wrong  .result-answer-text { color: #FF3B30; text-decoration: line-through; }
    .row-right  { background: rgba(52,199,89,0.10); margin-bottom: 24px; }
    .row-right  .result-answer-icon { color: #34C759; }
    .row-right  .result-answer-text { color: #1C7A3B; }

    .cta-btn {
      background: #34C759; color: white;
      border: none; border-radius: 14px;
      padding: 16px; font-size: 17px; font-weight: 700;
      font-family: inherit; cursor: pointer; width: 100%;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-btn:active { opacity: 0.85; transform: scale(0.98); }

    /* ───── End Screen ───── */
    .end-screen { justify-content: center; padding: 48px 28px; gap: 28px; }
    .end-trophy { font-size: 80px; text-align: center; }
    .end-title { font-size: 30px; font-weight: 800; color: #1C1C1E; text-align: center; }
    .end-sub { font-size: 15px; color: #8E8E93; text-align: center; margin-top: 6px; }

    .score-cards { display: flex; gap: 14px; justify-content: center; }
    .score-card {
      background: white; border-radius: 18px;
      padding: 20px 28px; text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      min-width: 120px;
    }
    .score-num { font-size: 44px; font-weight: 800; line-height: 1; }
    .score-name { font-size: 13px; color: #8E8E93; font-weight: 500; margin-top: 4px; }

    .end-btns { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .primary-btn {
      background: #1C3A5E; color: white;
      border: none; border-radius: 14px;
      padding: 16px; font-size: 17px; font-weight: 600;
      font-family: inherit; cursor: pointer; width: 100%;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .primary-btn:active { opacity: 0.85; transform: scale(0.98); }
    .ghost-btn {
      background: white; color: #1C3A5E;
      border: 2px solid #1C3A5E;
      border-radius: 14px;
      padding: 14px; font-size: 17px; font-weight: 600;
      font-family: inherit; cursor: pointer; width: 100%;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .ghost-btn:active { opacity: 0.7; transform: scale(0.98); }

    /* ───── Wrong List ───── */
    .wrong-screen { justify-content: flex-start; padding: 0; }

    .wrong-header {
      width: 100%; display: flex; align-items: center;
      padding: 20px 20px 14px; gap: 12px;
    }
    .wrong-screen-title { font-size: 20px; font-weight: 700; color: #1C1C1E; flex: 1; }
    .count-badge { font-size: 14px; font-weight: 600; color: #FF3B30; background: rgba(255,59,48,0.12); padding: 4px 12px; border-radius: 20px; }

    .wrong-list { width: 100%; flex: 1; padding: 4px 16px 40px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

    .wrong-item { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
    .wrong-item-wrong { font-size: 14px; color: #FF3B30; text-decoration: line-through; margin-bottom: 5px; }
    .wrong-item-correct { font-size: 16px; font-weight: 600; color: #34C759; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 48px;
    }
    .empty-icon { font-size: 64px; }
    .empty-text { font-size: 18px; font-weight: 600; color: #3A3A3C; text-align: center; }
    .empty-sub { font-size: 14px; color: #8E8E93; text-align: center; }

    /* ───── Help Modal ───── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.50);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; padding: 24px;
      animation: fadeIn .2s ease;
    }
    .help-modal {
      background: white; border-radius: 22px;
      padding: 28px 24px 24px; max-width: 360px; width: 100%;
      animation: scaleIn .25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes scaleIn { from { transform: scale(0.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .help-title { font-size: 20px; font-weight: 700; color: #1C1C1E; margin-bottom: 16px; text-align: center; }
    .help-text { font-size: 15px; color: #3A3A3C; line-height: 1.65; margin-bottom: 22px; }
    .help-text b { color: #1C3A5E; }

    /* ───── Loading ───── */
    .loading-screen {
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      background: #F2F2F7; gap: 18px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #E5E5EA;
      border-top-color: #1C3A5E;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #8E8E93; }

    /* ───── Keyboard hint ───── */
    .kb-hint {
      font-size: 12px; color: #C7C7CC;
      text-align: center; margin-top: 10px;
      display: none;
    }
    @media (hover: hover) and (pointer: fine) { .kb-hint { display: block; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  const THRESHOLD = 100;
  const WA_KEY = 'sy_wrong_v1';

  /* ── storage ── */
  const loadWrong = () => { try { return JSON.parse(localStorage.getItem(WA_KEY) || '[]'); } catch { return []; } };
  const saveWrong = arr => localStorage.setItem(WA_KEY, JSON.stringify(arr));
  const addWrong  = q => { const a = loadWrong(); if (!a.some(x => x.correct === q.correct)) saveWrong([...a, { correct: q.correct, incorrect: q.incorrect }]); };
  const rmWrong   = q => saveWrong(loadWrong().filter(x => x.correct !== q.correct));

  /* ── SwipeCard ── */
  function SwipeCard({ question, onSwipe }) {
    const [offset, setOffset]     = useState(0);
    const [dragging, setDragging] = useState(false);
    const [exiting, setExiting]   = useState(null);
    const latestOffset = useRef(0);
    const startX       = useRef(0);

    const begin = x => { startX.current = x; setDragging(true); };
    const move  = x => {
      const d = x - startX.current;
      latestOffset.current = d;
      setOffset(d);
    };
    const end   = useCallback(() => {
      setDragging(false);
      const d = latestOffset.current;
      if (Math.abs(d) >= THRESHOLD) {
        const right = d > 0;
        setExiting(right ? 'right' : 'left');
        setTimeout(() => onSwipe(right), 340);
      } else {
        setOffset(0);
        latestOffset.current = 0;
      }
    }, [onSwipe]);

    /* global mouse up/move */
    useEffect(() => {
      if (!dragging) return;
      const mm = e => move(e.clientX);
      const mu = () => end();
      window.addEventListener('mousemove', mm);
      window.addEventListener('mouseup', mu);
      return () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
    }, [dragging, end]);

    const x    = exiting ? (exiting === 'right' ? window.innerWidth + 200 : -(window.innerWidth + 200)) : offset;
    const rot  = (x / 300) * 14;
    const opa  = Math.min(Math.abs(x) / 100, 1);
    const goR  = x > 20;
    const goL  = x < -20;

    const style = {
      transform: `translateX(${x}px) rotate(${rot}deg)`,
      transition: dragging ? 'none' : exiting ? 'transform .34s cubic-bezier(0.4,0,1,1)' : 'transform .32s cubic-bezier(0.34,1.56,0.64,1)',
      willChange: 'transform',
    };

    return (
      <div
        className="card"
        style={style}
        onMouseDown={e => { e.preventDefault(); begin(e.clientX); }}
        onTouchStart={e => begin(e.touches[0].clientX)}
        onTouchMove={e => { e.preventDefault(); move(e.touches[0].clientX); }}
        onTouchEnd={end}
      >
        {goR && <div className="card-overlay" style={{ background: `rgba(52,199,89,${opa * 0.82})` }}><span className="overlay-stamp stamp-right">DOĞRU</span></div>}
        {goL && <div className="card-overlay" style={{ background: `rgba(255,59,48,${opa * 0.82})` }}><span className="overlay-stamp stamp-left">YANLIŞ</span></div>}
        <span className="card-text">{question.display}</span>
      </div>
    );
  }

  /* ── ResultModal ── */
  function ResultModal({ question, onNext }) {
    return (
      <div className="overlay-backdrop" onClick={onNext}>
        <div className="result-sheet" onClick={e => e.stopPropagation()}>
          <div className="result-pill" />
          <div className="result-row-header">
            <div className="result-icon-circle">✗</div>
            <span className="result-header-text">Yanlış cevap</span>
          </div>
          <div className="result-answer-row row-wrong">
            <span className="result-answer-icon">✗</span>
            <span className="result-answer-text">{question.incorrect}</span>
          </div>
          <div className="result-answer-row row-right">
            <span className="result-answer-icon">✓</span>
            <span className="result-answer-text">{question.correct}</span>
          </div>
          <button className="cta-btn" onClick={onNext}>Devam Et</button>
        </div>
      </div>
    );
  }

  /* ── HelpModal ── */
  function HelpModal({ onClose }) {
    return (
      <div className="modal-backdrop" onClick={onClose}>
        <div className="help-modal" onClick={e => e.stopPropagation()}>
          <div className="help-title">Nasıl Oynanır?</div>
          <div className="help-text">
            Ekranda ÖSYM'nin geçmiş yıllarda sorduğu yazım örnekleri çıkacak.<br/><br/>
            Yazımın <b>doğru</b> olduğunu düşünüyorsan <b>sağa →</b>, <b>yanlış</b> olduğunu düşünüyorsan <b>← sola</b> kaydır.<br/><br/>
            Kaydırdıktan sonra doğru yazım ekranda gösterilir.<br/><br/>
            Yanlış yaptığın sorular <b>Yanlışlarım</b> listesinde birikir; istediğin zaman geri dönüp tekrar çalışabilirsin.
          </div>
          <button className="cta-btn" onClick={onClose}>Anladım</button>
        </div>
      </div>
    );
  }

  /* ── WrongScreen ── */
  function WrongScreen({ onBack }) {
    const wrong = loadWrong();
    return (
      <div className="screen wrong-screen">
        <div className="wrong-header">
          <button className="back-btn" onClick={onBack}>←</button>
          <span className="wrong-screen-title">Yanlışlarım</span>
          {wrong.length > 0 && <span className="count-badge">{wrong.length} soru</span>}
        </div>
        {wrong.length === 0
          ? <div className="empty-state">
              <span className="empty-icon">✅</span>
              <span className="empty-text">Hiç yanlışın yok!</span>
              <span className="empty-sub">Harika iş çıkardın.</span>
            </div>
          : <div className="wrong-list">
              {wrong.map((q, i) => (
                <div className="wrong-item" key={i}>
                  <div className="wrong-item-wrong">{q.incorrect}</div>
                  <div className="wrong-item-correct">{q.correct} ✓</div>
                </div>
              ))}
            </div>
        }
      </div>
    );
  }

  /* ── GameScreen ── */
  function GameScreen({ rawQuestions, mode, onBack, onRefreshWrong }) {
    /* Prepare questions once */
    const [questions, setQuestions] = useState(() => {
      if (mode === 'wrongOnly') {
        return rawQuestions.map(q => {
          const showCorrect = Math.random() > 0.5;
          return { ...q, display: showCorrect ? q.correct : q.incorrect, isCorrectForm: showCorrect };
        });
      }
      const expanded = [];
      rawQuestions.forEach(q => {
        expanded.push({ ...q, display: q.correct,   isCorrectForm: true  });
        expanded.push({ ...q, display: q.incorrect, isCorrectForm: false });
      });
      for (let i = expanded.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [expanded[i], expanded[j]] = [expanded[j], expanded[i]];
      }
      return expanded;
    });

    const [idx,           setIdx]           = useState(0);
    const [correct,       setCorrect]       = useState(0);
    const [wrongList,     setWrongList]     = useState([]);
    const [result,        setResult]        = useState(null);
    const [gameOver,      setGameOver]      = useState(false);
    const [showWrongPanel,setShowWrongPanel]= useState(false);

    /* Keyboard support */
    useEffect(() => {
      const handler = e => {
        if (result || gameOver) return;
        if (e.key === 'ArrowRight') handleSwipe(true);
        if (e.key === 'ArrowLeft')  handleSwipe(false);
      };
      window.addEventListener('keydown', handler);
      return () => window.removeEventListener('keydown', handler);
    });

    const advance = useCallback(() => {
      if (idx + 1 >= questions.length) {
        onRefreshWrong();
        setGameOver(true);
      } else {
        setIdx(i => i + 1);
      }
    }, [idx, questions.length, onRefreshWrong]);

    const handleSwipe = useCallback((userSaidCorrect) => {
      const q = questions[idx];
      const isOk = userSaidCorrect === q.isCorrectForm;
      if (isOk) {
        if (mode === 'wrongOnly') rmWrong(q);
        setCorrect(c => c + 1);
        advance();
      } else {
        addWrong(q);
        setWrongList(list => [...list, q]);
        setResult({ question: q });
      }
    }, [idx, questions, mode, advance]);

    const handleNext = useCallback(() => {
      setResult(null);
      advance();
    }, [advance]);

    if (gameOver) {
      const total = questions.length;
      const wrong = wrongList.length;
      const pct   = Math.round((correct / total) * 100);
      return (
        <div className="screen end-screen">
          <div className="end-trophy">{pct >= 80 ? '🏆' : pct >= 55 ? '👏' : '💪'}</div>
          <div>
            <div className="end-title">{pct >= 80 ? 'Mükemmel!' : pct >= 55 ? 'Çok İyi!' : 'Devam Et!'}</div>
            <div className="end-sub">{total} sorudan {correct} doğru · %{pct}</div>
          </div>
          <div className="score-cards">
            <div className="score-card"><div className="score-num" style={{ color: '#34C759' }}>{correct}</div><div className="score-name">Doğru</div></div>
            <div className="score-card"><div className="score-num" style={{ color: '#FF3B30' }}>{wrong}</div><div className="score-name">Yanlış</div></div>
          </div>
          <div className="end-btns">
            <button className="primary-btn" onClick={() => {
              if (mode === 'wrongOnly') {
                const remaining = loadWrong()
                  .map(w => QUESTIONS.find(q => q.correct === w.correct) || w)
                  .filter(Boolean);
                if (remaining.length === 0) { onRefreshWrong(); onBack(); return; }
                setQuestions(remaining.map(q => {
                  const s = Math.random() > 0.5;
                  return { ...q, display: s ? q.correct : q.incorrect, isCorrectForm: s };
                }));
              }
              setIdx(0); setCorrect(0); setWrongList([]); setGameOver(false);
            }}>Tekrar Oyna</button>
            <button className="ghost-btn" onClick={onBack}>Ana Menü</button>
          </div>
        </div>
      );
    }

    const q = questions[idx];

    return (
      <div className="screen game-screen">
        <div className="game-header">
          <button className="back-btn" onClick={onBack}>←</button>
          <div style={{ flex: 1 }} />
          <div className="score-chips">
            <span className="chip chip-ok">✓ {correct}</span>
            <button className="chip chip-no" onClick={() => setShowWrongPanel(true)}>✗ {wrongList.length}</button>
          </div>
        </div>

        <div className="cards-area">
          <div className="card-stack-wrap">
            {idx + 2 < questions.length && <div className="ghost-card ghost-3" />}
            {idx + 1 < questions.length && <div className="ghost-card ghost-2" />}
            <div className="card-slot">
              <SwipeCard key={idx} question={q} onSwipe={handleSwipe} />
            </div>
          </div>
          <div className="swipe-hints">
            <div className="hint"><span className="hint-arrow" style={{ color: '#FF3B30' }}>←</span><span style={{ color: '#FF3B30' }}>Yanlış</span></div>
            <div className="hint"><span style={{ color: '#34C759' }}>Doğru</span><span className="hint-arrow" style={{ color: '#34C759' }}>→</span></div>
          </div>
          <div className="kb-hint">← sol ok · sağ ok →</div>
        </div>

        {result && <ResultModal question={result.question} onNext={handleNext} />}
        {showWrongPanel && <WrongPanel wrongList={wrongList} onClose={() => setShowWrongPanel(false)} />}
      </div>
    );
  }

  /* ── WrongPanel ── */
  function WrongPanel({ wrongList, onClose }) {
    return (
      <div className="overlay-backdrop" onClick={onClose}>
        <div className="wrong-panel-sheet" onClick={e => e.stopPropagation()}>
          <div className="result-pill" />
          <div className="wrong-panel-header">
            <span className="wrong-panel-title">Yanlışlarım</span>
            {wrongList.length > 0 && <span className="wrong-panel-badge">{wrongList.length}</span>}
            <button className="wrong-panel-close" onClick={onClose}>✕</button>
          </div>
          {wrongList.length === 0 ? (
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '12px', padding: '32px 0' }}>
              <span style={{ fontSize: '48px' }}>✅</span>
              <span style={{ fontSize: '16px', fontWeight: '600', color: '#3A3A3C' }}>Henüz yanlış yok!</span>
            </div>
          ) : (
            <div className="wrong-panel-list">
              {wrongList.map((q, i) => (
                <div className="wrong-panel-item" key={i}>
                  <div className="wrong-panel-incorrect">{q.incorrect}</div>
                  <div className="wrong-panel-correct">{q.correct}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── App ── */
  function App() {
    const [screen,        setScreen]        = useState('home');
    const [mode,          setMode]          = useState('all');
    const [wrongCount,    setWrongCount]    = useState(() => loadWrong().length);

    const refreshWrong = useCallback(() => setWrongCount(loadWrong().length), []);

    const handleStart = m => { setMode(m); setScreen('game'); };
    const handleBack  = () => { refreshWrong(); setScreen('home'); };

    if (screen === 'game') {
      const qs = mode === 'wrongOnly'
        ? (() => {
            const wrong = loadWrong();
            return wrong.map(w => QUESTIONS.find(q => q.correct === w.correct) || w).filter(Boolean);
          })()
        : QUESTIONS;

      if (qs.length === 0) return (
        <div className="screen end-screen">
          <span style={{ fontSize: 72 }}>✅</span>
          <div><div className="end-title">Hiç Yanlış Yok!</div><div className="end-sub">Tüm soruları doğru yaptın.</div></div>
          <button className="primary-btn" onClick={handleBack}>Ana Menü</button>
        </div>
      );

      return <GameScreen rawQuestions={qs} mode={mode} onBack={handleBack} onRefreshWrong={refreshWrong} />;
    }

    return <HomeScreen onStart={handleStart} wrongCount={wrongCount} totalCount={QUESTIONS.length * 2} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
